<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stability UI</title>

    <link rel="stylesheet" href="stability.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="sidebar">
      <div class="sidebarTop">
        <a class="brand" href="./main.html">
          <img class="logoImg" src="images/logo.png" alt="Logo" />
          <span class="mainTitle">The Lucid</span>
        </a>
      </div>

      <nav class="sidebarSection">
        <span class="sectionLabel">Main</span>
        <a class="navLink" href="./main.html">Overview</a>
        <a class="navLink" href="./actors.html">Actors</a>
        <a class="navLink" href="./scenes.html">Scenes</a>
        <a class="navLink" href="./variables.html">Variables</a>
      </nav>

      <nav class="sidebarSection">
        <span class="sectionLabel">Interfaces</span>
        <a class="navLink" href="choice.html">Button</a>
        <a class="navLink" href="./index.html">Stability</a>
        <a class="navLink" href="./cadena.html">Cadena</a>
      </nav>
    </header>

    <div class="stability-ui">
      <input type="radio" name="stability" id="s0" checked />
      <input type="radio" name="stability" id="s1" />
      <input type="radio" name="stability" id="s2" />
      <input type="radio" name="stability" id="s3" />
      <input type="radio" name="stability" id="s4" />
      <input type="radio" name="stability" id="s5" />

      <div class="controls">
        <label class="btn" for="s0">Stable</label>
        <label class="btn" for="s1">Troublé</label>
        <label class="btn" for="s2">Dégradé</label>
        <label class="btn" for="s3">Instable</label>
        <label class="btn" for="s4">Défaillant</label>
        <label class="btn" for="s5">Critique</label>
      </div>

      <div class="card">
        <div class="card-inner">
          <div class="bar"></div>

          <div>
            <div class="label">Stability status</div>
            <div class="value">
              <span class="v0">STABLE</span>
              <span class="v1">DISTURBED</span>
              <span class="v2">DEGRADED</span>
              <span class="v3">UNSTABLE</span>
              <span class="v4">FAILING</span>
              <span class="v5">CRITICAL</span>
            </div>
          </div>

          <div class="trend">
            <div class="arrow"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
