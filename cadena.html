<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Path Status UI</title>

    <link rel="stylesheet" href="cadena.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="sidebar">
      <div class="sidebarTop">
        <a class="brand" href="./main.html">
          <img class="logoImg" src="images/logo.png" alt="Logo" />
          <span class="mainTitle">The Lucid</span>
        </a>
      </div>

      <nav class="sidebarSection">
        <span class="sectionLabel">Main</span>
        <a class="navLink" href="./main.html">Overview</a>
        <a class="navLink" href="./actors.html">Actors</a>
        <a class="navLink" href="./scenes.html">Scenes</a>
        <a class="navLink" href="./variables.html">Variables</a>
      </nav>

      <nav class="sidebarSection">
        <span class="sectionLabel">Interfaces</span>
        <a class="navLink" href="choice.html">Button</a>
        <a class="navLink" href="./index.html">Stability</a>
        <a class="navLink" href="./cadena.html">Cadena</a>
      </nav>
    </header>

    <div class="testControls">
      <label id="lockBtn" class="btn">Locked</label>
      <label id="unlockBtn" class="btn">Unlocked</label>
    </div>

    <section class="statusBar unlocked" id="statusBar" aria-label="Path status">
      <div class="rail" aria-hidden="true"></div>

      <div class="content">
        <div class="label">Path status</div>
        <div class="stateRow">
          <div class="stateText" id="stateText">Unlocked</div>

          <div class="lockWrap">
            <div class="lock">
              <div class="shackle"></div>
              <div class="bodyIcon"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      const bar = document.getElementById("statusBar");
      const stateText = document.getElementById("stateText");

      function restartAnim(el, className) {
        el.classList.remove(className);
        void el.offsetWidth;
        el.classList.add(className);
      }

      function setState(unlocked) {
        bar.classList.toggle("unlocked", unlocked);
        bar.classList.toggle("locked", !unlocked);
        stateText.textContent = unlocked ? "Unlocked" : "Locked";

        restartAnim(bar, "animate");
        restartAnim(stateText, "animateText");
      }

      lockBtn.onclick = () => setState(false);
      unlockBtn.onclick = () => setState(true);
    </script>
  </body>
</html>
